<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>佛光山LINE使用習慣小調查</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --gold: #b8860b;
            --gold-light: #d4a843;
            --cream: #faf6ee;
            --brown: #5c3d2e;
            --brown-light: #7a5c4f;
            --warm-white: #fefcf7;
            --text: #3d2b1f;
            --text-light: #6b5344;
            --accent-pink: #e8c4c4;
        }

        body {
            font-family: 'Noto Serif TC', 'Georgia', serif;
            background-color: var(--cream);
            color: var(--text);
            min-height: 100vh;
            -webkit-font-smoothing: antialiased;
        }

        .page-wrapper {
            max-width: 520px;
            margin: 0 auto;
            padding: 0;
            background: var(--warm-white);
            min-height: 100vh;
            box-shadow: 0 0 60px rgba(92, 61, 46, 0.08);
        }

        /* Hero image section */
        .hero {
            position: relative;
            width: 100%;
            overflow: hidden;
        }

        .hero img {
            width: 100%;
            height: auto;
            display: block;
        }

        .hero-overlay {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 80px;
            background: linear-gradient(to bottom, transparent, var(--warm-white));
        }

        /* Content section */
        .content {
            padding: 24px 28px 40px;
        }

        .title {
            font-size: 1.65rem;
            font-weight: 700;
            color: var(--brown);
            text-align: center;
            line-height: 1.5;
            margin-bottom: 20px;
            letter-spacing: 0.04em;
        }

        .divider {
            width: 48px;
            height: 2px;
            background: var(--gold-light);
            margin: 0 auto 24px;
            border-radius: 1px;
        }

        .description {
            font-size: 1.05rem;
            line-height: 1.9;
            color: var(--text-light);
            text-align: center;
            margin-bottom: 12px;
        }

        .description strong {
            color: var(--brown);
            font-weight: 600;
        }

        .meta-info {
            text-align: center;
            margin: 20px 0 32px;
            display: flex;
            justify-content: center;
            gap: 20px;
            flex-wrap: wrap;
        }

        .meta-tag {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            font-size: 0.9rem;
            color: var(--brown-light);
            background: var(--cream);
            padding: 6px 14px;
            border-radius: 20px;
        }

        .meta-tag .icon {
            font-size: 1rem;
        }

        /* CTA Button */
        .cta-wrapper {
            text-align: center;
            padding: 0 12px;
        }

        .cta-button {
            display: inline-block;
            width: 100%;
            max-width: 320px;
            padding: 16px 32px;
            background: linear-gradient(135deg, var(--gold) 0%, var(--gold-light) 100%);
            color: #fff;
            font-family: 'Noto Serif TC', serif;
            font-size: 1.15rem;
            font-weight: 600;
            text-decoration: none;
            border-radius: 12px;
            letter-spacing: 0.08em;
            box-shadow: 0 4px 16px rgba(184, 134, 11, 0.3);
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }

        .cta-button:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 24px rgba(184, 134, 11, 0.4);
        }

        .cta-button:active {
            transform: translateY(0);
        }

        /* Privacy note */
        .privacy {
            text-align: center;
            font-size: 0.82rem;
            color: #a89585;
            margin-top: 16px;
            line-height: 1.6;
        }

        /* Footer */
        .footer {
            text-align: center;
            padding: 28px 20px 32px;
            font-size: 0.78rem;
            color: #b8a99a;
            border-top: 1px solid rgba(184, 134, 11, 0.12);
            margin-top: 32px;
        }

        /* Desktop adjustments */
        @media (min-width: 768px) {
            body {
                padding: 40px 20px;
                background: linear-gradient(160deg, #f5efe6 0%, #ece4d8 100%);
            }

            .page-wrapper {
                min-height: auto;
                border-radius: 16px;
                overflow: hidden;
                margin-top: 0;
            }

            .content {
                padding: 32px 48px 48px;
            }

            .title {
                font-size: 1.8rem;
            }
        }

        /* Subtle entrance animation */
        .content {
            animation: fadeUp 0.6s ease-out;
        }

        @keyframes fadeUp {
            from {
                opacity: 0;
                transform: translateY(16px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>
<body>
    <div class="page-wrapper">
        <div class="hero">
            <img src="xiaoshami.png" alt="智慧小沙彌">
            <div class="hero-overlay"></div>
        </div>

        <div class="content">
            <h1 class="title">佛光山LINE使用習慣小調查</h1>
            <div class="divider"></div>

            <p class="description">
                吉祥！我們正在了解信眾平常使用LINE和接收道場資訊的習慣，作為改善佛光山數位服務的參考。
            </p>

            <div class="meta-info">
                <span class="meta-tag">
                    <span class="icon">📋</span> 只有6題
                </span>
                <span class="meta-tag">
                    <span class="icon">⏱</span> 約1分鐘
                </span>
                <span class="meta-tag">
                    <span class="icon">🔒</span> 匿名填寫
                </span>
            </div>

            <div class="cta-wrapper">
                <a href="https://docs.google.com/forms/d/1ZOdQoH5KOsBkBQE8hkJQpC-h_xbW8vYxrfoYiTlmrcU/viewform" 
                   class="cta-button" 
                   target="_blank" 
                   rel="noopener noreferrer">
                    開始填寫問卷 🙏
                </a>
            </div>

            <p class="privacy">
                所有資料僅供內部參考，不會對外公開。
            </p>
        </div>

        <div class="footer">
            佛光山智慧小沙彌專案組
        </div>
    </div>
</body>
</html>
